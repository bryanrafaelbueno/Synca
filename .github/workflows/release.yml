name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            patchelf \
            nsis \
            mingw-w64 \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libfuse2t64

      - name: Install linuxdeploy
        run: |
          mkdir -p "$HOME/tools/linuxdeploy"
          wget \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O "$HOME/tools/linuxdeploy/linuxdeploy-x86_64.AppImage"
          chmod +x "$HOME/tools/linuxdeploy/linuxdeploy-x86_64.AppImage"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Create .env
        run: |
          cat > .env <<EOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          EOF

      - name: Build Linux
        run: make release-linux

      - name: Build Windows (GNU)
        run: make release-windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            releases/linux/**/*.AppImage
            releases/linux/**/*.deb
            releases/windows/**/*.exe

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}